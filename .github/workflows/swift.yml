# Builds the iOS app and runs the unit test suite on an iOS Simulator.
# This is an Xcode app project (no Package.swift), so it needs xcodebuild
# rather than `swift build` / `swift test`.

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Pick a simulator
      id: simulator
      run: |
        DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [^(]+' | head -1 | sed 's/ *$//')
        echo "Using simulator: $DEVICE"
        echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

    - name: Build and run unit tests
      # UI tests are skipped in CI for now: they are slow on shared runners
      # and the MonthReportUITests element queries are still being stabilized.
      run: |
        xcodebuild test \
          -project ministry-scheduler.xcodeproj \
          -scheme ministry-scheduler \
          -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}" \
          -skip-testing:ministry-schedulerUITests \
          CODE_SIGNING_ALLOWED=NO
